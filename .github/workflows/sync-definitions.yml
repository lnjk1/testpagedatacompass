name: Sync SQL Definitions

# Triggers on every push to main that touches at least one .md file
# inside the Warehouses/ folder.
on:
  push:
    branches:
      - main
    paths:
      - 'Warehouses/**/*.md'

permissions:
  contents: write   # needed to commit public/definitions.json back to the repo

jobs:
  sync:
    name: Sync definitions to public/definitions.json
    runs-on: ubuntu-latest

    steps:
      # -----------------------------------------------------------------------
      # 1. Checkout with enough history to detect the diff
      # -----------------------------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2   # need HEAD~1 to compute the file diff

      # -----------------------------------------------------------------------
      # 2. Detect which .md files were added/modified vs. deleted
      # -----------------------------------------------------------------------
      - name: Detect changed markdown files
        id: changed
        run: |
          UPSERT=$(git diff --name-only --diff-filter=AM HEAD~1 HEAD \
            | grep '^Warehouses/.*\.md$' || true)
          DELETED=$(git diff --name-only --diff-filter=D  HEAD~1 HEAD \
            | grep '^Warehouses/.*\.md$' || true)

          echo "UPSERT_FILES=$(echo $UPSERT | tr '\n' ' ' | xargs)"   >> $GITHUB_OUTPUT
          echo "DELETED_FILES=$(echo $DELETED | tr '\n' ' ' | xargs)" >> $GITHUB_OUTPUT

          echo "Upsert:  $UPSERT"
          echo "Deleted: $DELETED"

      # -----------------------------------------------------------------------
      # 3. Upsert changed/added definitions
      # -----------------------------------------------------------------------
      - name: Upsert changed definitions
        if: steps.changed.outputs.UPSERT_FILES != ''
        run: |
          python3 .github/scripts/sync_definitions.py \
            --action upsert \
            --files ${{ steps.changed.outputs.UPSERT_FILES }} \
            --definitions-file public/definitions.json

      # -----------------------------------------------------------------------
      # 4. Soft-delete removed definitions
      # -----------------------------------------------------------------------
      - name: Soft-delete removed definitions
        if: steps.changed.outputs.DELETED_FILES != ''
        run: |
          python3 .github/scripts/sync_definitions.py \
            --action delete \
            --files ${{ steps.changed.outputs.DELETED_FILES }} \
            --definitions-file public/definitions.json

      # -----------------------------------------------------------------------
      # 5. Commit updated public/definitions.json back to the repo
      #    (no [skip ci] — this commit intentionally triggers a redeploy)
      # -----------------------------------------------------------------------
      - name: Commit updated definitions
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/definitions.json
          git diff --cached --quiet || git commit -m "chore: sync definitions"
          git push
